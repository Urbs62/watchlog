<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101113">
    <meta name="description" content="WatchLog - samla och betygsatt tv-serier, filmer och miniserier.">
    <title>WatchLog</title>
    <link rel="manifest" href="icons/manifest.webmanifest">
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icons/icon.svg">
    <link rel="stylesheet" href="styles.css?v=9">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <header class="app-header">
        <div>
          <p class="eyebrow">Seriearkiv</p>
          <h1 id="app-title">WatchLog</h1>
        </div>
        <p class="title-count" aria-live="polite">
          <span id="total-count">0</span>
          <span>titlar</span>
        </p>
      </header>

      <section class="controls" aria-label="Filter och s&#246;k">
        <div class="import-actions">
          <label class="import-button">
            <input id="file-input" type="file" accept=".txt,text/plain">
            <span>Importera textlista</span>
          </label>
          <label class="import-button secondary-import">
            <input id="json-input" type="file" accept=".json,application/json">
            <span>Importera JSON</span>
          </label>
          <button id="export-button" class="export-button" type="button">Exportera JSON</button>
          <button id="clear-button" class="clear-button" type="button">Rensa lista</button>
        </div>

        <div class="filter-row" role="group" aria-label="Filtrera efter typ">
          <button class="filter-button is-active" type="button" data-filter="Alla">Alla</button>
          <button class="filter-button" type="button" data-filter="Serie">Serier</button>
          <button class="filter-button" type="button" data-filter="Film">Filmer</button>
          <button class="filter-button" type="button" data-filter="Miniserie">Miniserier</button>
        </div>

        <div class="filter-row rating-filter-row" role="group" aria-label="Filtrera efter betyg">
          <button class="filter-button is-active" type="button" data-rating-filter="Alla">Alla</button>
          <button class="filter-button" type="button" data-rating-filter="4">4 stj&#228;rnor</button>
          <button class="filter-button" type="button" data-rating-filter="3">3 stj&#228;rnor</button>
          <button class="filter-button" type="button" data-rating-filter="2">2 stj&#228;rnor</button>
          <button class="filter-button" type="button" data-rating-filter="1">1 stj&#228;rna</button>
        </div>

        <label class="search-wrap">
          <span class="sr-only">S&#246;k titel</span>
          <input id="search-input" type="search" placeholder="S&#246;k titel, &#229;r eller typ" autocomplete="off">
        </label>
      </section>

      <section>
        <div id="sections" class="sections" aria-label="Sparade titlar"></div>
        <p id="empty-state" class="empty-state" hidden>Inga titlar matchar filtret.</p>
      </section>
    </main>

    <button id="add-button" class="add-button" type="button" aria-label="L&#228;gg till titel">+</button>

    <div id="title-modal" class="modal" hidden>
      <div class="modal-backdrop" data-close-modal></div>
      <form id="title-form" class="modal-panel" aria-labelledby="modal-title">
        <div class="modal-header">
          <h2 id="modal-title">L&#228;gg till titel</h2>
          <button class="icon-button" type="button" data-close-modal aria-label="St&#228;ng">&times;</button>
        </div>

        <label class="field">
          <span>Title *</span>
          <input id="title-field" name="title" type="text" required autocomplete="off">
        </label>

        <div class="field-grid">
          <label class="field">
            <span>Type</span>
            <select id="type-field" name="type">
              <option>Serie</option>
              <option>Film</option>
              <option>Miniserie</option>
            </select>
          </label>

          <label class="field">
            <span>Season</span>
            <input id="season-field" name="season" type="text" autocomplete="off">
          </label>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>Rating</span>
            <select id="rating-field" name="rating">
              <option value="">None</option>
              <option value="1">1</option>
              <option value="1.5">1+</option>
              <option value="2">2</option>
              <option value="2.5">2+</option>
              <option value="3">3</option>
              <option value="3.5">3+</option>
              <option value="4">4</option>
              <option value="4.5">4+</option>
              <option value="5">5</option>
            </select>
          </label>

          <label class="field">
            <span>Status</span>
            <select id="status-field" name="status">
              <option>Sett</option>
              <option>Tips</option>
              <option>Vill se</option>
            </select>
          </label>
        </div>

        <label class="field">
          <span>Comment</span>
          <textarea id="comment-field" name="comment" rows="3"></textarea>
        </label>

        <label class="field">
          <span>Recommended by</span>
          <input id="recommended-field" name="recommendedBy" type="text" autocomplete="off">
        </label>

        <label class="field">
          <span>Egen infol&#228;nk</span>
          <input id="custom-info-url-field" name="customInfoUrl" type="text" inputmode="url" autocomplete="off" placeholder="https://">
        </label>

        <div class="modal-actions">
          <button id="delete-button" class="delete-button" type="button" hidden>Delete title</button>
          <span></span>
          <button class="secondary-button" type="button" data-close-modal>Cancel</button>
          <button class="save-button" type="submit">Save</button>
        </div>
      </form>
    </div>

    <script src="script.js?v=8"></script>
  </body>
</html>
